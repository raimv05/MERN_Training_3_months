<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>outer.html — the browser tab</title>
<style>
  body{
    margin:0;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:#0f1220;
    color:#e7e9f5;
    padding:24px;
  }
  .badge{
    display:inline-block;
    background:rgba(124,157,255,0.15);
    color:#7c9dff;
    font-family:"SFMono-Regular",Consolas,monospace;
    font-size:12px;
    padding:4px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  h1{font-size:18px;margin:0 0 4px}
  p{color:#9ba0c2;font-size:13.5px;margin:0 0 20px}
  iframe{
    width:100%;
    height:520px;
    border:2px solid #7c9dff;
    border-radius:10px;
    background:#fff;
  }
  .frame-label{
    font-family:"SFMono-Regular",Consolas,monospace;
    font-size:12px;
    color:#7c9dff;
    margin-bottom:6px;
  }
</style>
</head>
<body>
  <span class="badge">LEVEL 1 — outer.html</span>
  <h1>This is the actual browser tab</h1>
  <p>It contains an iframe loading middle.html, which itself contains an iframe loading inner.html.</p>
  <p style="color:#4fd1a5;font-weight:600;">👉 Start here. Don't open inner.html or middle.html directly — the demo only works through this file.</p>
  <div class="frame-label">↓ iframe pointing to middle.html</div>
  <iframe src="middle.html" title="middle.html"></iframe>
</body>
</html>
